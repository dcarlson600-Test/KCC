<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  min-height: 180px;
}

.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 50px 0;
}

.line {
  flex: 1;
  height: 1px;
  background: linear-gradient(
    to right,
    transparent,
    rgba(0,0,0,0.35),
    transparent
  );
}

.logo {
  padding: 0 35px;
}

.logo img {
  height: 95px;   /* Larger logo */
  display: block;
}
</style>
</head>
<body>

<div class="divider">
  <div class="line"></div>
  <div class="logo">
    <img src="https://dcarlson600-Test.github.io/KCC/Kellyslogo.png" alt="Kellys Logo">
  </div>
  <div class="line"></div>
</div>

</body>
</html>
