<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
}

.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 40px 0;
}

.line {
  flex: 1;
  height: 1px;
  background: linear-gradient(
    to right,
    transparent,
    rgba(0,0,0,0.35),
    transparent
  );
}

.logo {
  padding: 0 30px;
}

.logo img {
  height: 55px;
  display: block;
}
</style>
</head>
<body>

<div class="divider">
  <div class="line"></div>
  <div class="logo">
    <img src="https://dcarlson600-test.github.io/KCC/Kellyslogo.png" alt="Kelly's Logo">
  </div>
  <div class="line"></div>
</div>

</body>
</html>
