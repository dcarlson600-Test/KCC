<!DOCTYPE html>
<html style="overflow:hidden;">
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

img {
  width: 100%;
  display: block;
  object-fit: cover;

  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 10%,
    black 90%,
    transparent 100%
  );
  mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 10%,
    black 90%,
    transparent 100%
  );
}
</style>
</head>
<body>

<img src="coffee.png" alt="Coffee">

</body>
</html>
