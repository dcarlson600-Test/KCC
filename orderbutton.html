<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 130px;
}

.order-btn {
  background-color: #E6C9B3; /* Cream */
  color: #FFFFFF;            /* White text */
  padding: 18px 48px;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 8px 20px rgba(0,0,0,0.18);
  transition: all 0.25s ease;
  text-decoration: none;
}

.order-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 26px rgba(0,0,0,0.25);
}

.order-btn:active {
  transform: translateY(-1px);
}
</style>
</head>
<body>

<a href="https://central.toasttab.com/s/article/Toast-Online-Ordering-Pro-Menu-Page-Configuration?language=en_US"
   class="order-btn"
   target="_blank"
   rel="noopener">
  Order Online
</a>

</body>
</html>
