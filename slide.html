<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Section</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
}

body {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(180deg, #7A4F58 0%, #5E3A42 100%);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Floating Board */
.board {
    width: 92%;
    max-width: 1100px;
    height: 75%;
    background: linear-gradient(180deg, #86525C 0%, #6B424B 100%);
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    box-sizing: border-box;

    /* TRUE exterior drop shadow */
    box-shadow: 
        0 40px 100px rgba(0,0,0,0.45),
        0 10px 30px rgba(0,0,0,0.25);
}

/* Title */
.title {
    font-size: clamp(34px, 4vw, 60px);
    color: #F6D6D9;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(15px);
    animation: fadeUp 2s cubic-bezier(.22,.61,.36,1) forwards;
}

/* Smooth fade */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="board">
    <h1 class="title">Hold your next event here!</h1>
</div>

</body>
</html>
