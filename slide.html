<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Section</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(180deg, #7A4F58 0%, #5E3A42 100%);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main container */
.wrapper {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    text-align: center;
    padding: 40px;
    box-sizing: border-box;
}

/* Soft Edge Fade */
.wrapper::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
        ellipse at center,
        rgba(0,0,0,0) 65%,
        rgba(0,0,0,0.25) 100%
    );
}

/* Title */
.title {
    font-size: clamp(32px, 4vw, 56px);
    color: #F6D6D9;
    letter-spacing: 1px;
}

/* Elegant Fade-In */
.fade-in {
    opacity: 0;
    transform: translateY(15px);
    transition:
        opacity 2s ease-out,
        transform 2s cubic-bezier(.22,.61,.36,1);
}

.fade-in.active {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="wrapper">
    <h1 class="title fade-in">Hold your next event here!</h1>
</div>

<script>
const element = document.querySelector('.fade-in');

const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('active');
        obs.unobserve(entry.target);
    });
}, { threshold: 0.5 });

observer.observe(element);
</script>

</body>
</html>
