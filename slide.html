<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Section</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(180deg, #5A343C 0%, #40262C 100%);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Clean floating board */
.board {
    width: 88%;
    max-width: 1100px;
    height: 70%;
    background: #8C5C65; /* rose latte */
    border-radius: 22px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    box-sizing: border-box;

    /* refined shadow */
    box-shadow:
        0 25px 60px rgba(0,0,0,0.35),
        0 5px 15px rgba(0,0,0,0.25);
}

/* Title */
.title {
    font-size: clamp(36px, 4vw, 64px);
    color: #FBE6E8;
    letter-spacing: 0.5px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 1.8s ease-out forwards;
}

/* Smooth animation */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="board">
    <h1 class="title">Hold your next event here!</h1>
</div>

</body>
</html>
