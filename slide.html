<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelly's Animated Section</title>

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #F6F2EE;
    color: #3E3A37;
    overflow-x: hidden;
}

/* Section Styling */
.section {
    padding: 140px 20px;
    text-align: center;
}

.logo-section {
    background: linear-gradient(180deg, #F6F2EE 0%, #EFE7E3 100%);
}

.logo {
    font-size: 3.8rem;
    color: #C9A3A3;
    margin: 0;
    letter-spacing: 1px;
}

.subtext {
    letter-spacing: 4px;
    font-size: 1rem;
    color: #777;
    margin-top: 12px;
}

.card {
    max-width: 900px;
    margin: 80px auto;
    padding: 60px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.05);
}

/* Slower Elegant Slide-Up Animation */
.fade-up {
    opacity: 0;
    transform: translateY(30px);
    transition:
        opacity 2.2s ease-out,
        transform 2.2s cubic-bezier(.22,.61,.36,1);
}

.fade-up.active {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<section class="section logo-section fade-up">
    <h1 class="logo">Kelly's Cone and Coffee</h1>
    <p class="subtext">COFFEE • ICE CREAM</p>
</section>

<section class="section fade-up">
    <div class="card">
        <h2>Fresh Morning Classics</h2>
        <p>Elegant favorites served daily in a warm and inviting atmosphere.</p>
    </div>
</section>

<section class="section fade-up">
    <div class="card">
        <h2>Soft Boutique Feel</h2>
        <p>Inspired by refined blush tones, clean design, and modern brunch elegance.</p>
    </div>
</section>

<section class="section fade-up">
    <div class="card">
        <h2>Order Online</h2>
        <p>Simple. Fresh. Ready when you are.</p>
    </div>
</section>

<script>
const faders = document.querySelectorAll('.fade-up');

const appearOptions = {
    threshold: 0.15,
    rootMargin: "0px 0px -40px 0px"
};

const appearOnScroll = new IntersectionObserver(function(entries, observer) {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;

        entry.target.classList.add('active');
        observer.unobserve(entry.target);
    });
}, appearOptions);

faders.forEach((fader, index) => {
    fader.style.transitionDelay = (index * 0.35) + "s";
    appearOnScroll.observe(fader);
});
</script>

</body>
</html>
