<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelly's Section</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(180deg, #7A4F58 0%, #5E3A42 100%);
    color: #F3E8E6;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main container */
.wrapper {
    width: 100%;
    max-width: 1000px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
    padding: 30px 40px;
    box-sizing: border-box;
    position: relative;
}

/* Soft Edge Fade */
.wrapper::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
        ellipse at center,
        rgba(0,0,0,0) 65%,
        rgba(0,0,0,0.25) 100%
    );
}

/* Logo */
.logo {
    font-size: clamp(28px, 3vw, 40px);
    color: #F6D6D9;
    margin: 0;
    text-align: center;
}

.subtext {
    letter-spacing: 3px;
    font-size: clamp(12px, 1.2vw, 14px);
    color: #E7C6CA;
    margin-top: 6px;
    text-align: center;
}

/* Cards */
.card {
    background: #F6F2EE;
    color: #3E3A37;
    border-radius: 12px;
    padding: 18px 24px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.15);
    text-align: center;
    font-size: clamp(13px, 1.2vw, 15px);
}

/* Animation */
.fade-up {
    opacity: 0;
    transform: translateY(15px);
    transition:
        opacity 1.6s ease-out,
        transform 1.6s cubic-bezier(.22,.61,.36,1);
}

.fade-up.active {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="fade-up">
        <h1 class="logo">Kelly's Cone and Coffee</h1>
        <p class="subtext">COFFEE • ICE CREAM</p>
    </div>

    <div class="card fade-up">
        Fresh classics served daily in a warm boutique atmosphere.
    </div>

    <div class="card fade-up">
        Refined blush tones. Soft espresso warmth. Modern elegance.
    </div>

    <div class="card fade-up">
        Simple. Fresh. Ready when you are.
    </div>

</div>

<script>
const elements = document.querySelectorAll('.fade-up');

const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('active');
        obs.unobserve(entry.target);
    });
}, { threshold: 0.2 });

elements.forEach((el, index) => {
    el.style.transitionDelay = (index * 0.2) + "s";
    observer.observe(el);
});
</script>

</body>
</html>
