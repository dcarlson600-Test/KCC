<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelly's Animated Section</title>

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #F6F2EE;
    color: #3E3A37;
    overflow-x: hidden;
}

/* Section Styling */
.section {
    padding: 120px 20px;
    text-align: center;
}

.logo-section {
    background: linear-gradient(180deg, #F6F2EE 0%, #EFE7E3 100%);
}

.logo {
    font-size: 3.5rem;
    color: #C9A3A3;
    margin: 0;
}

.subtext {
    letter-spacing: 4px;
    font-size: 1rem;
    color: #777;
    margin-top: 10px;
}

.card {
    max-width: 900px;
    margin: 60px auto;
    padding: 50px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.06);
}

/* Slide-Up Animation */
.fade-up {
    opacity: 0;
    transform: translateY(70px);
    transition: all 0.9s cubic-bezier(.21,.68,.36,1);
}

.fade-up.active {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<section class="section logo-section fade-up">
    <h1 class="logo">Kelly's</h1>
    <p class="subtext">BREAKFAST • LUNCH</p>
</section>

<section class="section fade-up">
    <div class="card">
        <h2>Fresh Morning Classics</h2>
        <p>Elegant breakfast favorites served daily in a warm and inviting atmosphere.</p>
    </div>
</section>

<section class="section fade-up">
    <div class="card">
        <h2>Soft Blush Boutique Feel</h2>
        <p>Inspired by refined, feminine tones and modern brunch elegance.</p>
    </div>
</section>

<section class="section fade-up">
    <div class="card">
        <h2>Order Online</h2>
        <p>Simple. Fresh. Ready when you are.</p>
    </div>
</section>

<script>
const faders = document.querySelectorAll('.fade-up');

const appearOptions = {
    threshold: 0.2,
    rootMargin: "0px 0px -50px 0px"
};

const appearOnScroll = new IntersectionObserver(function(entries, observer) {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('active');
        observer.unobserve(entry.target);
    });
}, appearOptions);

faders.forEach(fader => {
    appearOnScroll.observe(fader);
});
</script>

</body>
</html>
