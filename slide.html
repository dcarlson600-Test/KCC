<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Section</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Playfair Display', serif;
    background: #F3ECE8; /* soft neutral blush */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Clean floating frame */
.frame {
    width: 85%;
    max-width: 1000px;
    padding: 80px 40px;
    background: #FFFFFF;
    border-radius: 28px;

    /* soft luxury shadow */
    box-shadow:
        0 40px 80px rgba(0,0,0,0.08),
        0 8px 20px rgba(0,0,0,0.05);

    text-align: center;
}

/* Title */
.title {
    font-size: clamp(40px, 4.5vw, 72px);
    color: #3A2C2F;
    letter-spacing: 0.3px;
    font-weight: 500;
    line-height: 1.2;

    opacity: 0;
    transform: translateY(20px);
    animation: rise 1.6s ease-out forwards;
}

/* Elegant animation */
@keyframes rise {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="frame">
    <h1 class="title">Hold your next event here!</h1>
</div>

</body>
</html>
