<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelly's Animated Section</title>


<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(180deg, #7A4F58 0%, #5E3A42 100%);
    color: #F3E8E6;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main container locked to viewport */
.wrapper {
    width: 100%;
    max-width: 1100px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
    padding: 40px;
    box-sizing: border-box;
    position: relative;
}

/* Edge Fade Overlay */
.wrapper::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
        ellipse at center,
        rgba(0,0,0,0) 55%,
        rgba(0,0,0,0.35) 100%
    );
}

/* Logo */
.logo {
    font-size: 3rem;
    color: #F6D6D9;
    margin: 0;
    text-align: center;
}

.subtext {
    letter-spacing: 3px;
    font-size: 0.9rem;
    color: #E7C6CA;
    margin-top: 8px;
    text-align: center;
}

/* Cards scaled tighter */
.card {
    background: #F6F2EE;
    color: #3E3A37;
    border-radius: 14px;
    padding: 30px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    text-align: center;
}

/* Animation */
.fade-up {
    opacity: 0;
    transform: translateY(20px);
    transition:
        opacity 2s ease-out,
        transform 2s cubic-bezier(.22,.61,.36,1);
}

.fade-up.active {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="fade-up">
        <h1 class="logo">Kelly's Cone and Coffee</h1>
        <p class="subtext">COFFEE • ICE CREAM</p>
    </div>

    <div class="card fade-up">
        <h2>Fresh Classics</h2>
        <p>Elegant favorites served daily in a warm boutique atmosphere.</p>
    </div>

    <div class="card fade-up">
        <h2>Refined Feel</h2>
        <p>Blush tones. Soft espresso warmth. Modern elegance.</p>
    </div>

    <div class="card fade-up">
        <h2>Order Online</h2>
        <p>Simple. Fresh. Ready when you are.</p>
    </div>

</div>

<script>
const faders = document.querySelectorAll('.fade-up');

const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('active');
        obs.unobserve(entry.target);
    });
}, { threshold: 0.2 });

faders.forEach((el, index) => {
    el.style.transitionDelay = (index * 0.25) + "s";
    observer.observe(el);
});
</script>

</body>
</html>
