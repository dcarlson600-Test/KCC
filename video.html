<!DOCTYPE html>
<html style="overflow:hidden;">
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

video {
  width: 100%;
  display: block;
  object-fit: cover;

  /* Combined horizontal + vertical dissolve */
  -webkit-mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 4%,
      black 96%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 10%,
      black 90%,
      transparent 100%);

  -webkit-mask-composite: source-in;
  mask-composite: intersect;

  mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 10%,
      black 90%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 10%,
      black 90%,
      transparent 100%);
}
</style>
</head>
<body>

<video autoplay muted loop playsinline>
  <source src="Coffee pour.mp4" type="video/mp4">
</video>

</body>
</html>
