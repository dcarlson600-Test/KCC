<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;

  /* Smooth warm tan espresso gradient */
  background: linear-gradient(
    145deg,
    #6b4a36 0%,
    #8a6148 45%,
    #5a3d2c 100%
  );
}

/* Centered video container */
.video-wrapper {
  max-width: 1200px;
  margin: 80px auto;
  border-radius: 14px;
  overflow: hidden;

  /* Softer, cleaner shadow */
  box-shadow:
    0 25px 50px rgba(0, 0, 0, 0.35),
    0 8px 18px rgba(0, 0, 0, 0.18);
}

video {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>
<body>

<div class="video-wrapper">
  <video autoplay muted loop playsinline>
    <source src="Coffee test (3).mp4" type="video/mp4">
  </video>
</div>

</body>
</html>
