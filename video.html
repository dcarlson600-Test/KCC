<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
  height: 100%;
}

.video-wrapper {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;

  /* 15% fade on all edges */
  -webkit-mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 15%,
      black 85%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 15%,
      black 85%,
      transparent 100%);

  -webkit-mask-composite: source-in;
  mask-composite: intersect;

  mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 15%,
      black 85%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 15%,
      black 85%,
      transparent 100%);
}
</style>
</head>
<body>

<div class="video-wrapper">
  <video autoplay muted loop playsinline>
    <source src="https://dcarlson600-Test.github.io/KCC/KV.m4v" type="video/mp4">
  </video>
</div>

</body>
</html>
