<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 60px;
  box-sizing: border-box;

  /* Smooth espresso gradient */
  background: linear-gradient(
    135deg,
    #2b1a12 0%,
    #3a2419 40%,
    #2f1d15 100%
  );
}

/* Center container */
.video-wrapper {
  max-width: 1200px;
  margin: auto;
  border-radius: 14px;
  overflow: hidden;

  /* Professional layered shadow */
  box-shadow:
    0 30px 60px rgba(0, 0, 0, 0.45),
    0 10px 20px rgba(0, 0, 0, 0.25);
}

video {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>
<body>

<div class="video-wrapper">
  <video autoplay muted loop playsinline>
    <source src="Coffee test (3).mp4" type="video/mp4">
  </video>
</div>

</body>
</html>
